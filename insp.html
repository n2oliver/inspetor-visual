<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspetor Visual</title>
    <script src="insp.js"></script>
    <link rel="stylesheet" href="scripts/bootstrap-5.0.2-dist/css/bootstrap.min.css" />
    <script src="scripts/tesseract/tesseract.min.js"></script>
</head>
<body style="margin: 0">
    <div style="background-color: darkslategray; color: aquamarine; padding: 14px; width: 300px">
        <div class="d-flex align-items-center">
            <img class="m-1 mt-0" src="images/insp-32.png" style="float: left; height: 32px; width: 32px" />
            <span class="m-1 mt-0" id="tooltip">Copie um elemento pelo menu de contexto Inpetor Visual.</span>            
        </div>
        <div class="d-flex">
            <div class="m-1 mt-0">
                <input class="form-check-input" type="checkbox" checked="true" role="switch" id="insp_visual_ligado" />
            </div>
            <div class="m-1 mt-0">
                <label class="form-check-label" for="insp_visual_ligado">Ativado</label>
            </div>
        </div>
        <div class="d-flex justify-content-between">
            <div class="d-flex">
                <div class="m-1 mt-0">
                    <input class="form-check-input" type="checkbox" checked="false" role="switch" id="insp_visual_leitor_de_tela" />
                </div>
                <div class="m-1 mt-0">
                    <label class="form-check-label" for="insp_visual_leitor_de_tela">Leitor de tela</label>
                </div>
            </div>
            <button class="btn-info rounded-circle" style="width: 32px; height: 32px" title="1. Para bloquear o inspetor na tela, toque nele ou pressione B.
2. Para desbloquear, se apenas tocou no inspetor, toque fora dele.
3. Toque no botão 'bloqueado' ou tecle B novamente para desbloquear."><strong class="text-primary">?</strong></button>
        </div>
        <div class="d-flex justify-content-center m-1 mt-0">
            <select id="vozes" class="form-control">
            </select>
        </div>
        <div class="d-flex justify-content-end">
            <a href="https://n2oliver.com" id="n2oliver-link" class="text-warning"><img src="images/n2oliver.png" class="w-100" /></a>
        </div>
        
    </div>
</body>
</html>
